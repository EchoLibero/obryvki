<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>
<style>
body{font-family:Georgia,serif;max-width:720px;margin:0 auto;padding:2rem;background:#111;color:#eee;line-height:1.75}
a{color:#9b8ac4;text-decoration:none}
a:hover{text-decoration:underline}
.nav{display:flex;justify-content:space-between;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid #333}
.chapter-body p{margin:1em 0}
.chapter-body h2{color:#c4b5fd;margin-top:2em}
mark{background:rgba(118,75,162,.25);padding:.1em .3em;border-radius:3px}
blockquote{border-left:3px solid #764ba2;padding-left:1rem;opacity:.75;margin-left:0}
</style>
</head>
<body>
<div class="nav">
<a href="/">← Оглавление</a>
{% if page.prev %}<a href="{{ page.prev.url }}">← {{ page.prev.title }}</a>{% endif %}
{% if page.next %}<a href="{{ page.next.url }}">{{ page.next.title }} →</a>{% endif %}
</div>
{{ content }}
<div class="nav">
{% if page.prev %}<a href="{{ page.prev.url }}">← {{ page.prev.title }}</a>{% endif %}
{% if page.next %}<a href="{{ page.next.url }}">{{ page.next.title }} →</a>{% endif %}
</div>
</body>
</html>
